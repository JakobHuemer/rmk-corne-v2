[keyboard]
name = "rmk-corne-v2"
product_name = "jakkis corne"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "RMK"
chip = "nrf52840"

[layout]
rows = 4
cols = 10
layers = 1
keymap = [
    [
        ["B", "L", "D", "W", "Z", "Quote", "F", "O", "U", "J"],
        ["N", "R", "T", "S", "G", "Y", "H", "A", "E", "I"],
        ["Q", "X", "M", "C", "V", "K", "P", "Dot", "Minus", "Comma"],
        ["_", "_", "LShift", "Space", "_", "_", "Backspace", "RAlt", "_", "_"]
    ]
]

[ble]
enabled = true

# nRF52840's saadc pin for reading battery level, you can use a pin number or "vddh"
battery_adc_pin = "vddh"
# Set the BLE tx power; higher means better signal but more power consumption. For nRF52840 the maximum tx power is 8.
default_tx_power = 4

[split]
connection = "ble"

[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0

[split.central.matrix]
row_pins = ["P0_22", "P0_24", "P1_00", "P0_11"]
col_pins = ["P0_29", "P0_02", "P1_15", "P1_13", "P1_11"]

[[split.peripheral]]
rows = 4
cols = 5
row_offset = 0
col_offset = 5

[split.peripheral.matrix]
row_pins = ["P0_22", "P0_24", "P1_00", "P0_11"]
col_pins = ["P1_11", "P1_13", "P1_15", "P0_02", "P0_29"]

[storage]
# Enable/disable storage feature (default: true)
enabled = true
# Number of flash sectors to allocate (default: 2)
num_sectors = 2
# Storage start address (default: 0 = auto-allocate from end)
start_addr = 0x00000000
# Clear all storage data on boot, including keymap, BLE bonds, etc
clear_storage = false
# Clear only layout/keymap data, preserve BLE bonds
clear_layout = false

[rmk]
split_peripherals_num = 1

ble_profiles_num = 6

